services:
  frontend:
    restart: always
    build: 
      context: ./apps/fp-app/fingerprint-client
      dockerfile: Dockerfile 
      args:
        - VITE_API_URL=/api
    volumes:
      - ./apps/fp-app/fingerprint-client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/certs/cloudflare.pem:/etc/ssl/certs/cloudflare.pem:ro
      - /etc/ssl/private/cloudflare.key:/etc/ssl/private/cloudflare.key:ro
    networks:
      - dlrs-net
    depends_on:
      - api

  api: 
    restart: always
    build: ./fingerprint-server
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=${PORT}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      - mongo
    ports:
      - "5001:5001"

  mongo:
    image: mongo:latest
    volumes:
      - mongo-data-prod:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}

volumes:
  mongo-data-prod: